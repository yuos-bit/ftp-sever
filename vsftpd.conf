# ============================================================
# vsftpd.conf — vsftpd 服务器配置文件
# 更新日期: 2026-07-09
# 适配: Ubuntu 22.04，安全加固版本
# ============================================================

# ---------- 基本运行模式 ----------

# 前台运行（保持容器不退出）
background=NO

# ---------- 用户访问控制 ----------

# 禁止匿名登录
anonymous_enable=NO

# 允许本地用户登录
local_enable=YES

# 启用虚拟用户
guest_enable=YES

# 虚拟用户使用与本地用户相同的权限
virtual_use_local_privs=YES

# 允许写入操作
write_enable=YES

# PAM 认证服务名称
pam_service_name=vsftpd_virtual

# 虚拟用户的主目录
user_sub_token=$USER
local_root=/home/vsftpd/$USER

# ---------- chroot 安全配置 ----------

# 将用户限制在自己的主目录中
chroot_local_user=YES

# 安全的 chroot 解决方案：
# 使用非可写目录作为 chroot 目标，避免 allow_writeable_chroot 的安全风险
# 在用户主目录下创建可写子目录，而 chroot 根目录本身不可写
# 参考: https://www.benscobie.com/fixing-500-oops-vsftpd-refusing-to-run-with-writable-root-inside-chroot/
# 注意: 不再使用 allow_writeable_chroot=YES
# 替代方案: 在 run-vsftpd.sh 中创建不可写的 chroot 根目录 + 可写的子目录

# ---------- 用户和权限 ----------

# 隐藏 UID/GID 信息
hide_ids=YES

# ---------- 日志配置 ----------

xferlog_enable=YES
xferlog_file=/var/log/vsftpd/vsftpd.log

# ---------- 主动模式配置 ----------

port_enable=YES
connect_from_port_20=YES
ftp_data_port=20

# ---------- 安全沙箱配置 ----------

# 安全沙箱配置
# 注意：在部分 Docker 环境下 seccomp=YES 可能导致 vsftpd 启动失败
# 如果容器不断重启，请尝试将此项改为 NO
seccomp_sandbox=NO

# ---------- 日志详细程度 ----------

# 记录所有 FTP 命令和响应（用于调试）
log_ftp_protocol=NO

# 详细日志格式
vsftpd_log_file=/var/log/vsftpd/vsftpd.log
dual_log_enable=YES

# ---------- 连接安全 ----------

# 设置数据连接超时（秒）
data_connection_timeout=300
# 设置空闲会话超时（秒）
idle_session_timeout=600

# 最大客户端数量
max_clients=10
# 每个 IP 的最大连接数
max_per_ip=3

# 本地文件权限掩码
local_umask=077

# ---------- 以下配置在容器启动时通过 run-vsftpd.sh 动态设置 ----------
### pasv_address=${PASV_ADDRESS}
### pasv_max_port=${PASV_MAX_PORT}
### pasv_min_port=${PASV_MIN_PORT}
### pasv_addr_resolve=${PASV_ADDR_RESOLVE}
### pasv_enable=${PASV_ENABLE}
### file_open_mode=${FILE_OPEN_MODE}
### local_umask=${LOCAL_UMASK}
### xferlog_std_format=${XFERLOG_STD_FORMAT}
### reverse_lookup_enable=${REVERSE_LOOKUP_ENABLE}
### pasv_promiscuous=${PASV_PROMISCUOUS}
### port_promiscuous=${PORT_PROMISCUOUS}