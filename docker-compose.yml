# ============================================================
# docker-compose.yml — yuos/ftp-server 服务定义
# 更新日期: 2026-07-10
# ============================================================

services:

  vsftpd:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: crpi-p23ba2t3b53i8v8p.cn-chengdu.personal.cr.aliyuncs.com/yuos-data/ftp-sever:latest
    container_name: vsftpd
    restart: unless-stopped
    # 允许 vsftpd 所需的系统调用（seccomp 沙箱）
    security_opt:
      - seccomp=unconfined
    ports:
      # FTP 控制端口（注意：宿主 2021 → 容器 21）
      - "2021:21"
      # FTP 数据端口（主动模式）
      - "2020:20"
      # 被动模式端口范围（保持与 PASV_MIN/MAX_PORT 一致）
      - "2030-2040:2030-2040"
    environment:
      # FTP 账户配置
      FTP_USER: admin
      FTP_PASS: ftpadmin..
      # 被动模式地址：必须设为宿主机真实 IP（客户端通过此 IP 连接数据端口）
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 2030
      PASV_MAX_PORT: 2040
      # 启用混杂模式（NAT/端口映射环境下必须开启，否则数据连接被拒）
      PASV_PROMISCUOUS: "YES"
      PORT_PROMISCUOUS: "YES"
      # 其他配置（可按需修改）
      LOG_STDOUT: "YES"
    volumes:
      # FTP 数据目录：宿主 ./files/data/ → 容器 /home/vsftpd/admin/
      # 容器内结构：/home/vsftpd/admin/ 为 chmod 555（不可写根）
      #               /home/vsftpd/admin/files 为 chmod 755（可写）
      # 宿主机只需在 ./files/ 下放 data/ 目录，用户登录后看到 data/
      - "./files/data:/home/vsftpd/admin"
      # 日志目录（可选）
      - "./logs:/var/log/vsftpd"